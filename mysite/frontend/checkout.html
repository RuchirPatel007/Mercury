<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Mercury</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="checkout">
  <header id="site-header"></header>

  <main class="page-body">
    <div class="container">
      <div class="page-title-block">
        <div class="hero-eyebrow">// launch sequence</div>
        <h1>Checkout</h1>
      </div>
      <div id="checkout-root">
        <div class="loading-text">Preparing checkout…</div>
      </div>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <script src="https://js.stripe.com/v3/"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script>
    let stripe, cardElement, elements;

    async function init() {
      const root = document.getElementById('checkout-root');

      if (!Auth.isLoggedIn()) {
        window.location.href = 'login.html?redirect=checkout';
        return;
      }
      const items = Cart.getItems();
      if (!items.length) {
        root.innerHTML = `<div class="empty-state"><h3>Your cart is empty.</h3><p>Add an aircraft before checking out.</p><a href="products.html" class="btn">Browse the fleet</a></div>`;
        return;
      }

      let products, total = 0;
      try {
        products = await Promise.all(items.map(i => Api.get(`/product/${i.product_id}/`)));
      } catch (err) {
        root.innerHTML = `<div class="error-text">${friendlyError(err)}</div>`;
        return;
      }
      items.forEach((item, idx) => { total += products[idx].price * item.quantity; });

      root.innerHTML = `
        <div class="cart-layout">
          <form class="form-panel wide" id="checkout-form">
            <div class="form-error" id="form-error"></div>
            <h3 style="margin-bottom:20px;">Shipping address</h3>
            <div class="field">
              <label for="address">Delivery address</label>
              <textarea id="address" required placeholder="Street, city, state, postcode, country"></textarea>
            </div>
            <h3 style="margin:26px 0 16px;">Payment</h3>
            <div class="field">
              <label>Card details</label>
              <div id="card-element"></div>
            </div>
            <button class="btn full" id="pay-btn" type="submit">Pay $${total.toFixed(2)}</button>
          </form>
          <div class="cart-summary">
            <h4 style="font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:14px;">Order summary</h4>
            ${items.map((item, idx) => `
              <div class="summary-row"><span>${products[idx].name} × ${item.quantity}</span><span class="mono">$${(products[idx].price * item.quantity).toFixed(2)}</span></div>
            `).join('')}
            <div class="summary-row total"><span>Total</span><span class="mono">$${total.toFixed(2)}</span></div>
          </div>
        </div>`;

      stripe = Stripe(CONFIG.STRIPE_PUBLIC_KEY);
      elements = stripe.elements();
      cardElement = elements.create('card', {
        style: { base: { color: '#EDEFF3', fontFamily: 'Inter, sans-serif', '::placeholder': { color: '#8B96A8' } } },
      });
      cardElement.mount('#card-element');

      document.getElementById('checkout-form').addEventListener('submit', (e) => handleSubmit(e, items, products, total));
    }

    async function handleSubmit(e, items, products, total) {
      e.preventDefault();
      const errorBox = document.getElementById('form-error');
      const payBtn = document.getElementById('pay-btn');
      errorBox.style.display = 'none';
      payBtn.disabled = true;
      payBtn.textContent = 'Processing…';

      const user = Auth.getUser();
      if (!user || !user.id) {
        errorBox.textContent = 'Your account ID could not be resolved from the backend (the /api/me/ endpoint is missing — see the README). Orders need it to be created.';
        errorBox.style.display = 'block';
        payBtn.disabled = false;
        payBtn.textContent = `Pay $${total.toFixed(2)}`;
        return;
      }

      try {
        // 1. create the order
        const order = await Api.post('/order/', {
          user: user.id,
          address: document.getElementById('address').value,
          status: 'PENDING',
          total: total.toFixed(2),
        }, { auth: true });

        // 2. create order items
        await Promise.all(items.map((item) =>
          Api.post('/orderitem/', { order: order.id, product: item.product_id, quantity: item.quantity }, { auth: true })
        ));

        // 3. get a payment intent from the backend
        const { client_secret } = await Api.post('/create-payment/', { order_id: order.id }, { auth: true, root: true });

        // 4. confirm the card payment with Stripe
        const result = await stripe.confirmCardPayment(client_secret, {
          payment_method: { card: cardElement },
        });

        if (result.error) {
          throw { status: 0, detail: result.error.message };
        }

        // 5. record the payment and mark the order as processing
        await Api.post('/payment/', {
          order: order.id,
          total: total.toFixed(2),
          status: 'SUCCESS',
          payment_id: result.paymentIntent.id,
        }, { auth: true });
        await Api.patch(`/order/${order.id}/`, { status: 'PROCESSING' }, { auth: true });

        Cart.clear();
        document.getElementById('checkout-root').innerHTML = `
          <div class="empty-state">
            <h3>Order confirmed ✓</h3>
            <p>Order #${order.id} is being processed. A confirmation will follow shortly.</p>
            <a href="products.html" class="btn">Keep browsing</a>
          </div>`;
      } catch (err) {
        errorBox.textContent = friendlyError(err);
        errorBox.style.display = 'block';
        payBtn.disabled = false;
        payBtn.textContent = `Pay $${total.toFixed(2)}`;
      }
    }

    init();
  </script>
</body>
</html>
