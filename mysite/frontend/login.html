<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — Mercury</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="login">
  <header id="site-header"></header>

  <main class="page-body">
    <div class="container" style="display:flex;justify-content:center;">
      <form class="form-panel" id="login-form">
        <div class="hero-eyebrow">// pilot access</div>
        <h1 style="font-size:28px;">Log in</h1>
        <div class="form-error" id="form-error"></div>
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" required autocomplete="username">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>
        <button class="btn full" type="submit" id="login-btn">Log in</button>
        <p class="form-note">Accounts are provisioned by Mercury directly — <a href="contact.html">contact us</a> to get set up.</p>
      </form>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorBox = document.getElementById('form-error');
      const btn = document.getElementById('login-btn');
      errorBox.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Logging in…';
      try {
        await Auth.login(
          document.getElementById('username').value,
          document.getElementById('password').value
        );
        const params = new URLSearchParams(window.location.search);
        const redirect = params.get('redirect');
        window.location.href = redirect ? `${redirect}.html` : 'index.html';
      } catch (err) {
        errorBox.textContent = err.status === 400 ? 'Incorrect username or password.' : friendlyError(err);
        errorBox.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Log in';
      }
    });
  </script>
</body>
</html>
