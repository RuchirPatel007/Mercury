<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Mercury</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="contact">
  <header id="site-header"></header>

  <main class="page-body">
    <div class="container" style="display:flex;justify-content:center;">
      <form class="form-panel wide" id="contact-form">
        <div class="hero-eyebrow">// open a channel</div>
        <h1 style="font-size:28px;">Get in touch</h1>
        <p style="margin-bottom:22px;">Questions about a specific aircraft, bulk orders, or support — send it through and we'll respond directly.</p>
        <div class="form-error" id="form-error"></div>
        <div class="form-success" id="form-success">Message received. We'll be in touch shortly.</div>
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required>
        </div>
        <div class="field">
          <label for="phone">Phone</label>
          <input type="text" id="phone" required>
        </div>
        <div class="field">
          <label for="budget">Budget</label>
          <input type="text" id="budget" placeholder="e.g. $2,000–5,000" required>
        </div>
        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" required></textarea>
        </div>
        <button class="btn full" type="submit" id="contact-btn">Send message</button>
      </form>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.getElementById('contact-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorBox = document.getElementById('form-error');
      const successBox = document.getElementById('form-success');
      const btn = document.getElementById('contact-btn');
      errorBox.style.display = 'none';
      successBox.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Sending…';
      try {
        await Api.post('/contact/', {
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          phone: document.getElementById('phone').value,
          budget: document.getElementById('budget').value,
          message: document.getElementById('message').value,
        });
        successBox.style.display = 'block';
        e.target.reset();
      } catch (err) {
        errorBox.textContent = friendlyError(err);
        errorBox.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send message';
      }
    });
  </script>
</body>
</html>
