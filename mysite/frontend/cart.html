<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your cart — Mercury</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="cart">
  <header id="site-header"></header>

  <main class="page-body">
    <div class="container">
      <div class="page-title-block">
        <div class="hero-eyebrow">// payload manifest</div>
        <h1>Your cart</h1>
      </div>
      <div id="cart-root">
        <div class="loading-text">Loading cart…</div>
      </div>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script>
    async function renderCart() {
      const root = document.getElementById('cart-root');
      const items = Cart.getItems();
      if (!items.length) {
        root.innerHTML = `
          <div class="empty-state">
            <h3>Your cart is empty.</h3>
            <p>Browse the fleet and add an aircraft to get started.</p>
            <a href="products.html" class="btn">Browse the fleet</a>
          </div>`;
        return;
      }
      root.innerHTML = '<div class="loading-text">Loading cart…</div>';
      try {
        const products = await Promise.all(items.map(i => Api.get(`/product/${i.product_id}/`)));
        let total = 0;
        const rows = items.map((item, idx) => {
          const p = products[idx];
          const lineTotal = p.price * item.quantity;
          total += lineTotal;
          return `
            <tr class="cart-row" data-id="${item.product_id}">
              <td>
                <div class="cart-product">
                  <img src="${p.image ? mediaUrl(p.image) : ''}" alt="${p.name}">
                  <div>
                    <div class="name">${p.name}</div>
                    <div class="mono" style="font-size:12px;color:var(--text-dim);">$${p.price} each</div>
                  </div>
                </div>
              </td>
              <td>
                <div class="qty-control">
                  <button class="qty-dec">−</button>
                  <span>${item.quantity}</span>
                  <button class="qty-inc">+</button>
                </div>
              </td>
              <td class="mono">$${lineTotal.toFixed(2)}</td>
              <td><button class="btn-ghost small btn-danger remove-btn">Remove</button></td>
            </tr>`;
        }).join('');

        root.innerHTML = `
          <div class="cart-layout">
            <table class="cart-table">
              <thead><tr><th>Aircraft</th><th>Qty</th><th>Subtotal</th><th></th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
            <div class="cart-summary">
              <div class="summary-row"><span>Items</span><span class="mono">${items.reduce((s, i) => s + i.quantity, 0)}</span></div>
              <div class="summary-row total"><span>Total</span><span class="mono">$${total.toFixed(2)}</span></div>
              <a href="checkout.html" class="btn full" style="margin-top:18px;display:flex;">Proceed to checkout</a>
            </div>
          </div>`;

        root.querySelectorAll('.cart-row').forEach(row => {
          const id = parseInt(row.dataset.id, 10);
          row.querySelector('.qty-inc').addEventListener('click', () => {
            const current = Cart.getItems().find(i => i.product_id === id);
            Cart.updateQuantity(id, current.quantity + 1);
            renderCart();
          });
          row.querySelector('.qty-dec').addEventListener('click', () => {
            const current = Cart.getItems().find(i => i.product_id === id);
            Cart.updateQuantity(id, current.quantity - 1);
            renderCart();
          });
          row.querySelector('.remove-btn').addEventListener('click', () => {
            Cart.remove(id);
            renderCart();
          });
        });
      } catch (err) {
        root.innerHTML = `<div class="error-text">${friendlyError(err)}</div>`;
      }
    }

    renderCart();
  </script>
</body>
</html>
