<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mercury — Aircraft detail</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="product">
  <header id="site-header"></header>

  <main class="page-body">
    <div class="container">
      <div id="product-root">
        <div class="loading-text">Loading aircraft…</div>
      </div>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');
    let quantity = 1;

    async function loadProduct() {
      const root = document.getElementById('product-root');
      if (!productId) { root.innerHTML = '<div class="error-text">No aircraft specified.</div>'; return; }
      try {
        const [product, colors] = await Promise.all([
          Api.get(`/product/${productId}/`),
          Api.get('/color/').catch(() => []),
        ]);
        const colorList = Array.isArray(colors) ? colors : colors.results || [];
        const productColors = (product.colours || []).map(id => colorList.find(c => c.id === id)).filter(Boolean);

        root.innerHTML = `
          <div class="product-detail">
            <div class="product-media hud-frame">
              <span class="hud-corner-tr"></span><span class="hud-corner-bl"></span>
              ${product.image ? `<img src="${mediaUrl(product.image)}" alt="${product.name}">` : ''}
            </div>
            <div class="product-info">
              <div class="hero-eyebrow">// aircraft file</div>
              <h1>${product.name}</h1>
              <div class="price">$${product.price}</div>
              <p>${product.about || ''}</p>

              <div class="spec-panel">
                <h4>Telemetry</h4>
                <div class="chip-row">
                  ${specChip('speed', product.speed, 'km/h top speed')}
                  ${specChip('range', `${product.range_min}–${product.range_max}`, 'km range')}
                  ${specChip('battery', product.battery, 'min flight')}
                  ${specChip('charge', product.charging_time, 'min charge')}
                  ${specChip('payload', product.playload, 'g payload')}
                  ${specChip('gps', product.gps ? 'Enabled' : 'None', 'GPS')}
                </div>
              </div>

              ${productColors.length ? `
                <div>
                  <h4 style="font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);">Finish</h4>
                  <div class="color-swatches">
                    ${productColors.map((c, i) => `<span class="swatch ${i === 0 ? 'selected' : ''}" style="background:${c.hex_code}" title="${c.name}" data-color="${c.id}"></span>`).join('')}
                  </div>
                </div>` : ''}

              <div class="qty-row">
                <div class="qty-control">
                  <button id="qty-minus">−</button>
                  <span id="qty-display">1</span>
                  <button id="qty-plus">+</button>
                </div>
                <button class="btn" id="add-to-cart-btn">Add to cart</button>
              </div>
            </div>
          </div>`;

        root.querySelectorAll('.swatch').forEach(sw => {
          sw.addEventListener('click', () => {
            root.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
            sw.classList.add('selected');
          });
        });
        document.getElementById('qty-minus').addEventListener('click', () => {
          quantity = Math.max(1, quantity - 1);
          document.getElementById('qty-display').textContent = quantity;
        });
        document.getElementById('qty-plus').addEventListener('click', () => {
          quantity += 1;
          document.getElementById('qty-display').textContent = quantity;
        });
        document.getElementById('add-to-cart-btn').addEventListener('click', (e) => {
          Cart.add(product.id, quantity);
          e.target.textContent = 'Added ✓';
          setTimeout(() => { e.target.textContent = 'Add to cart'; }, 1400);
        });
      } catch (err) {
        root.innerHTML = `<div class="error-text">${friendlyError(err)}</div>`;
      }
    }

    loadProduct();
  </script>
</body>
</html>
